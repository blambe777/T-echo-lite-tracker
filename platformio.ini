[platformio]
default_envs = dog_tracker

[env]
platform = nordicnrf52
framework = arduino
board = lilygo_t_echo_lite_nrf52840
board_build.variants_dir = variants
monitor_speed = 115200
monitor_dtr = 1
monitor_rts = 0
upload_speed = 115200
upload_protocol = nrfutil
lib_ldf_mode = chain+
build_flags =
    -DRADIOLIB_TONE_UNSUPPORTED
    -Ilibraries/private_library
    -Ilibraries/Bluefruit52Lib/src
    -Ilibraries/Adafruit_nRFCrypto/src
    -Ilibraries/Adafruit_TinyUSB_Arduino/src
    -Ilibraries/SPI
    -Ilibraries/Wire
    -Ilibraries/RadioLib-7.1.2/src
    -Ilibraries/TinyGPSPlus-1.0.3a/src
    -Ilibraries/Adafruit_EPD-4.5.5/src
    -Ilibraries/Adafruit-GFX-Library-1.11.10
    -Ilibraries/Adafruit_BusIO-1.16.1
    -Iexamples/T-Echo-Lite/Display

; Each environment has an explicit source filter. This prevents PlatformIO from
; reusing stale source selections when switching between examples and firmware.
[env:serial_test]
lib_extra_dirs = ./libraries
build_src_filter =
    -<*>
    +<serial_test/>

[env:example_gps]
lib_extra_dirs = ./libraries
build_src_filter =
    -<*>
    +<example_gps/>

[env:example_display]
lib_extra_dirs = ./libraries
build_src_filter =
    -<*>
    +<example_display/>

[env:example_sx126x_pingpong]
lib_extra_dirs = ./libraries
build_src_filter =
    -<*>
    +<example_sx126x_pingpong/>

[env:example_battery_measurement]
lib_extra_dirs = ./libraries
build_src_filter =
    -<*>
    +<example_battery_measurement/>

[env:example_ble_uart]
lib_extra_dirs = ./libraries
build_src_filter =
    -<*>
    +<example_ble_uart/>

[env:dog_tracker]
lib_extra_dirs = ./libraries
build_src_filter =
    -<*>
    +<dog_tracker/>

[env:heltec_base_station]
platform = espressif32@6.12.0
board = heltec_wifi_lora_32_V3
framework = arduino
upload_protocol = esptool
upload_speed = 460800
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
lib_ldf_mode = chain+
lib_deps =
    jgromes/RadioLib
    knolleary/PubSubClient
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
build_flags =
    -DHELTEC_WIFI_LORA_32_V3_BASE
    -IC:/Users/Barry/.platformio/packages/framework-arduinoespressif32/variants/heltec_wifi_lora_32_V3
build_src_filter =
    -<*>
    +<heltec_base_station/>

[env:t3s3_remote_base]
platform = espressif32@6.12.0
board = t3_s3_v1_x
framework = arduino
board_build.variant = esp32s3
upload_protocol = esptool
upload_speed = 921600
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
lib_ldf_mode = chain+
lib_deps =
    jgromes/RadioLib
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -IC:/Users/Barry/.platformio/packages/framework-arduinoespressif32/variants/esp32s3
build_src_filter =
    -<*>
    +<t3s3_remote_base/>

[env:t3s3_main_base]
platform = espressif32@6.12.0
board = t3_s3_v1_x
framework = arduino
board_build.variant = esp32s3
upload_protocol = esptool
upload_speed = 460800
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
lib_ldf_mode = chain+
lib_deps =
    jgromes/RadioLib
    knolleary/PubSubClient
    adafruit/Adafruit SSD1306
    adafruit/Adafruit GFX Library
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -IC:/Users/Barry/.platformio/packages/framework-arduinoespressif32/variants/esp32s3
build_src_filter =
    -<*>
    +<t3s3_main_base/>
